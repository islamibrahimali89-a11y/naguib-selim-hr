<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجيب سليم | لوحة المشرف</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary:#693C0F;--primary-light:#8B5E34;--primary-dark:#4A2A0A;
            --accent:#D4A574;--accent-light:#F0DCC8;--accent-pale:#FAF4ED;
            --bg:#F7F4F0;--card-bg:#FFFFFF;--text:#2C2218;--text-mid:#5C4A3A;--text-light:#8C7B6B;
            --border:#E8DFD4;--border-light:#F2ECE4;
            --success:#2E7D32;--success-bg:#E8F5E9;--error:#B71C1C;--error-bg:#FFEBEE;
            --blue:#1565C0;--blue-bg:#E3F2FD;
            --shadow-md:0 4px 16px rgba(74,42,10,0.08);--radius:12px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

        .login-overlay{position:fixed;inset:0;background:linear-gradient(160deg,var(--primary-dark),var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;z-index:9999;}
        .login-overlay.hidden{display:none;}
        .login-box{background:#fff;border-radius:20px;padding:40px 30px;width:90%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
        .login-logo{width:70px;height:70px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-family:'Amiri',serif;font-size:28px;color:var(--accent);font-weight:700;}
        .login-box h2{font-size:19px;color:var(--primary-dark);margin-bottom:4px;}
        .login-box p{font-size:13px;color:var(--text-light);margin-bottom:22px;}
        .login-box input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:14px;margin-bottom:10px;outline:none;text-align:right;}
        .login-box input:focus{border-color:var(--primary);}
        .login-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
        .login-btn:hover{background:var(--primary-dark);}
        .login-err{color:var(--error);font-size:12px;margin-top:8px;display:none;}
        .login-err.show{display:block;}

        .main-page{display:none;}.main-page.show{display:block;}
        .header{background:var(--primary-dark);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
        .header-right h1{color:#fff;font-size:20px;font-weight:800;}
        .header-right p{color:rgba(255,255,255,0.55);font-size:12px;}
        .header-left{display:flex;align-items:center;gap:12px;}
        .user-badge{background:rgba(255,255,255,0.1);color:var(--accent);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;}
        .logout-btn{background:rgba(255,255,255,0.1);color:#fff;border:none;padding:7px 16px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;}
        .logout-btn:hover{background:rgba(255,255,255,0.2);}
        .accent-bar{height:3px;background:linear-gradient(to right,var(--accent),var(--primary-light),var(--accent));opacity:0.4;}

        .toolbar{background:var(--card-bg);padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
        .toolbar select,.toolbar input[type="text"]{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Tajawal',sans-serif;font-size:12px;background:var(--accent-pale);outline:none;}
        .toolbar select:focus,.toolbar input:focus{border-color:var(--primary);}
        .tool-btn{padding:8px 18px;border:none;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
        .btn-refresh{background:var(--primary);color:#fff;}.btn-refresh:hover{background:var(--primary-dark);}
        .btn-export{background:var(--success);color:#fff;margin-right:auto;}.btn-export:hover{background:#1B5E20;}

        .table-wrap{padding:16px;overflow-x:auto;}
        table{width:100%;min-width:1500px;border-collapse:separate;border-spacing:0;background:var(--card-bg);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-md);}
        thead{background:var(--primary-dark);}
        thead th{color:#fff;font-size:11.5px;font-weight:700;padding:13px 10px;text-align:right;white-space:nowrap;}
        thead th.ec{background:var(--primary-light);}
        tbody tr{border-bottom:1px solid var(--border-light);transition:0.15s;}
        tbody tr:hover{background:rgba(105,60,15,0.02);}
        tbody td{padding:10px;font-size:12.5px;vertical-align:top;border-bottom:1px solid #f0ebe5;}
        .td-ro{background:#FDFBF8;}.td-ed{background:#FFFCF5;}

        .status-sel{padding:6px 8px;border-radius:6px;border:1.5px solid var(--border);font-family:'Tajawal',sans-serif;font-size:11.5px;font-weight:700;cursor:pointer;outline:none;width:100%;min-width:130px;}
        .st-p{background:var(--error-bg);color:var(--error);border-color:#EF9A9A;}
        .st-i{background:var(--blue-bg);color:var(--blue);border-color:#90CAF9;}
        .st-d{background:var(--success-bg);color:var(--success);border-color:#A5D6A7;}

        .fb-input{width:100%;min-width:170px;padding:7px 10px;border:1.5px solid var(--accent);border-radius:6px;font-family:'Tajawal',sans-serif;font-size:12px;resize:vertical;min-height:48px;outline:none;background:#fff;}
        .fb-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(105,60,15,0.07);}

        .sla-tag{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap;}
        .sla-on{background:var(--success-bg);color:var(--success);}
        .sla-out{background:var(--error-bg);color:var(--error);}
        .sla-na{background:#F5F5F5;color:#999;}

        .empty-msg{text-align:center;padding:50px 20px;color:var(--text-light);font-size:15px;}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--success);color:#fff;padding:10px 24px;border-radius:10px;font-weight:700;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,0.2);transition:transform 0.3s;z-index:999;}
        .toast.pop{transform:translateX(-50%) translateY(0);}

        @media(max-width:768px){.toolbar{flex-direction:column;}.btn-export{margin-right:0;width:100%;}.header{flex-direction:column;gap:10px;text-align:center;}.header-left{justify-content:center;}}
    </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <div class="login-logo">ن</div>
        <h2>لوحة المشرف</h2>
        <p>نجيب سليم — إدارة الموارد البشرية</p>
        <input type="text" id="loginUser" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button class="login-btn" onclick="doLogin()">تسجيل الدخول</button>
        <div class="login-err" id="loginErr">اسم المستخدم أو كلمة المرور غير صحيحة</div>
    </div>
</div>

<div class="main-page" id="mainPage">
    <div class="header">
        <div class="header-right"><h1>لوحة المشرف — طلبات HR</h1><p>عرض ومعالجة الطلبات</p></div>
        <div class="header-left">
            <div class="user-badge" id="userBadge">—</div>
            <button class="logout-btn" onclick="doLogout()">خروج</button>
        </div>
    </div>
    <div class="accent-bar"></div>

    <div class="toolbar">
        <select id="fDept" onchange="loadTable()"><option value="">كل الإدارات</option><option value="المبيعات">المبيعات</option><option value="سلاسل الامداد">سلاسل الامداد</option><option value="خدمة العملاء">خدمة العملاء</option><option value="التصنيع">التصنيع</option><option value="دعم الاعمال">دعم الاعمال</option><option value="تكنولوجيا المعلومات">تكنولوجيا المعلومات</option><option value="الحسابات">الحسابات</option><option value="شركة الجملة">شركة الجملة</option></select>
        <select id="fStatus" onchange="loadTable()"><option value="">كل الحالات</option><option value="لم يتم العمل عليه">لم يتم العمل عليه</option><option value="قيد التنفيذ">قيد التنفيذ</option><option value="تم الانتهاء">تم الانتهاء</option></select>
        <select id="fType" onchange="loadTable()"><option value="">كل الأنواع</option><option value="1">مفردات المرتب</option><option value="2">رصيد اجازات</option><option value="3">سجل حضور</option><option value="4">HR Letter</option><option value="5">شكوى</option><option value="6">ختم أوراق</option><option value="7">سلفة</option><option value="8">إبلاغ مخالفة</option></select>
        <input type="text" id="fSearch" placeholder="بحث برقم الطلب..." oninput="loadTable()">
        <button class="tool-btn btn-refresh" onclick="loadTable()">🔄 تحديث</button>
        <button class="tool-btn btn-export" onclick="exportCSV()">📥 تصدير Excel</button>
    </div>

    <div class="table-wrap">
        <table><thead><tr>
            <th>#</th><th>رقم الطلب</th><th>الرقم الوظيفي</th><th>الهاتف</th><th>الإدارة</th><th>نوع الطلب</th><th>تفاصيل</th><th>تعليق</th><th>تاريخ الإرسال</th><th>SLA</th><th>Ontime/SLA</th><th class="ec">HR Feedback ✏️</th><th class="ec">حالة الطلب ✏️</th>
        </tr></thead><tbody id="tBody"></tbody></table>
        <div class="empty-msg" id="emptyMsg" style="display:none;">لا توجد طلبات حالياً</div>
    </div>
</div>
<div class="toast" id="toast">✅ تم الحفظ</div>

<script>
const SUPABASE_URL = 'https://vievkkhwwsdeecxazfqp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpZXZra2h3d3NkZWVjeGF6ZnFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDY3MDAsImV4cCI6MjA5MDcyMjcwMH0.okIbSC-_GSeXcNgxTLlwZ2SVvJtMs14pVcFGq_nbJPQ';
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let currentUser=null,allRequests=[];

async function doLogin(){
    const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value;
    if(!u||!p)return;
    const{data,error}=await supabase.rpc('verify_password',{p_username:u,p_password:p});
    if(error||!data||!data.length){document.getElementById('loginErr').classList.add('show');return;}
    const user=data[0];
    if(user.role!=='supervisor'&&user.role!=='admin'){document.getElementById('loginErr').classList.add('show');return;}
    currentUser=user;sessionStorage.setItem('hr_sup',JSON.stringify(user));showMain();
}
function showMain(){document.getElementById('loginOverlay').classList.add('hidden');document.getElementById('mainPage').classList.add('show');document.getElementById('userBadge').textContent=currentUser.display_name;loadTable();}
function doLogout(){sessionStorage.removeItem('hr_sup');currentUser=null;location.reload();}
const sv=sessionStorage.getItem('hr_sup');if(sv){currentUser=JSON.parse(sv);showMain();}
document.getElementById('loginPass').addEventListener('keyup',e=>{if(e.key==='Enter')doLogin();});

async function loadTable(){
    let q=supabase.from('hr_requests').select('*').order('submitted_at',{ascending:false});
    const d=document.getElementById('fDept').value,s=document.getElementById('fStatus').value,t=document.getElementById('fType').value,sr=document.getElementById('fSearch').value.trim().toLowerCase();
    if(d)q=q.eq('department',d);if(s)q=q.eq('status',s);if(t)q=q.eq('request_type',t);if(sr)q=q.ilike('ticket',`%${sr}%`);
    const{data,error}=await q;if(error){console.error(error);return;}
    allRequests=data||[];renderRows(allRequests);
}
function ext(r){if(r.request_type==='4')return'الجهة: '+(r.hr_letter_dest||'—');if(r.request_type==='5')return'سبب: '+(r.complaint_reason||'—');if(r.request_type==='8')return'نوع: '+(r.violation_reason||'—');return'—';}
function slaC(r){if(r.status!=='تم الانتهاء'||!r.status_updated_at)return'—';const d=(new Date(r.status_updated_at)-new Date(r.submitted_at))/(1e3*60*60);return d<=(r.sla_hours||24)?'Ontime':'Out of SLA';}
function stC(s){return s==='لم يتم العمل عليه'?'st-p':s==='قيد التنفيذ'?'st-i':'st-d';}

function renderRows(rows){
    const tb=document.getElementById('tBody'),em=document.getElementById('emptyMsg');
    if(!rows.length){tb.innerHTML='';em.style.display='block';return;}em.style.display='none';
    tb.innerHTML=rows.map((r,i)=>{
        const sla=slaC(r),slaCl=sla==='Ontime'?'sla-on':sla==='Out of SLA'?'sla-out':'sla-na';
        const dt=new Date(r.submitted_at).toLocaleString('ar-EG',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
        return`<tr><td class="td-ro">${i+1}</td><td class="td-ro" style="font-weight:700;direction:ltr;text-align:center;font-size:11px;">${r.ticket}</td><td class="td-ro" style="text-align:center;">${r.emp_id}</td><td class="td-ro" style="direction:ltr;text-align:center;">${r.phone}</td><td class="td-ro">${r.department}</td><td class="td-ro">${r.request_name}</td><td class="td-ro">${ext(r)}</td><td class="td-ro" style="max-width:160px;">${r.comment||'—'}</td><td class="td-ro" style="white-space:nowrap;font-size:11px;">${dt}</td><td class="td-ro" style="font-size:11px;">${r.sla_text}</td><td class="td-ro"><span class="sla-tag ${slaCl}">${sla}</span></td><td class="td-ed"><textarea class="fb-input" data-id="${r.id}" onchange="saveFB(this)">${r.hr_feedback||''}</textarea></td><td class="td-ed"><select class="status-sel ${stC(r.status)}" data-id="${r.id}" onchange="saveST(this)"><option value="لم يتم العمل عليه" ${r.status==='لم يتم العمل عليه'?'selected':''}>لم يتم العمل عليه</option><option value="قيد التنفيذ" ${r.status==='قيد التنفيذ'?'selected':''}>قيد التنفيذ</option><option value="تم الانتهاء" ${r.status==='تم الانتهاء'?'selected':''}>تم الانتهاء</option></select></td></tr>`;
    }).join('');
}

async function saveFB(el){await supabase.from('hr_requests').update({hr_feedback:el.value,updated_by:currentUser?.id||null}).eq('id',el.dataset.id);toast();}
async function saveST(el){
    const u={status:el.value,updated_by:currentUser?.id||null};
    if(el.value==='تم الانتهاء')u.status_updated_at=new Date().toISOString();else u.status_updated_at=null;
    await supabase.from('hr_requests').update(u).eq('id',el.dataset.id);
    el.className='status-sel '+stC(el.value);toast();setTimeout(loadTable,500);
}
function toast(){const t=document.getElementById('toast');t.classList.add('pop');setTimeout(()=>t.classList.remove('pop'),2000);}
function exportCSV(){
    if(!allRequests.length){alert('لا توجد بيانات');return;}
    let c='\uFEFF'+'رقم الطلب,الرقم الوظيفي,الهاتف,الإدارة,نوع الطلب,تفاصيل,تعليق,تاريخ الإرسال,SLA,الحالة,HR Feedback,تاريخ التحديث,Ontime/SLA\n';
    allRequests.forEach(r=>{const sla=slaC(r),dt=new Date(r.submitted_at).toLocaleString('ar-EG'),udt=r.status_updated_at?new Date(r.status_updated_at).toLocaleString('ar-EG'):'';c+=`${r.ticket},${r.emp_id},${r.phone},${r.department},${r.request_name},"${ext(r)}","${r.comment||''}",${dt},${r.sla_text},${r.status},"${r.hr_feedback||''}",${udt},${sla}\n`;});
    const b=new Blob([c],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`HR_Requests_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
setInterval(loadTable,30000);
</script>
</body>
</html>
